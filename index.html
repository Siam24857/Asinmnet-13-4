<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  font-family: "Open Sans", sans-serif;
}
.active-btn {
  background-color: #3b82f6 !important;
  color: white !important;
  border-color: #3b82f6 !important;
}
</style>
</head>

<body class="bg-[#F8FAFC] p-4 md:p-0">

<header class="md:pl-[80px] md:pt-[60px]">
  <h1 class="text-3xl font-bold">Job Application Tracker</h1>

  <section class="mt-6 gap-3 grid grid-cols-1 md:grid-cols-3">

    <div class="w-full md:w-[360px] bg-white p-5 rounded-2xl">
      <h2 class="mb-5 font-bold">Total Applications</h2>
      <span id="totalCount" class="font-bold text-xl">8</span>
    </div>

    <div class="w-full md:w-[360px] bg-white p-5 rounded-2xl">
      <h2 class="mb-5 font-bold">Interview</h2>
      <span id="interviewCount" class="font-bold text-xl">0</span>
    </div>

    <div class="w-full md:w-[360px] bg-white p-5 rounded-2xl">
      <h2 class="mb-5 font-bold">Rejected</h2>
      <span id="rejectedCount" class="font-bold text-xl">0</span>
    </div>

  </section>
</header>

<!-- Jobs Section -->
<div id="jobsSection" class="md:pl-[80px] md:pt-[60px] mt-6 md:mt-0">

  <div class="flex justify-between items-center mb-3 pr-6">
    <h2 class="text-2xl font-bold">Available Jobs</h2>
    <div>
    <span id="tabCount" class="font-bold">8</span> <span id="job-text" class="font-bold">jobs</span> 
    <span id="ofText" class="font-bold hidden"> of 8 jobs</span>
    </div>
  </div>

  <div class="mb-4">
    <button id="btn-all" onclick="showAll()" class="btn btn-sm mx-1 pl-[30px] pr-[30px]">All</button>
    <button id="btn-intervew" onclick="showInterview()" class="btn btn-sm mx-1">Interview</button>
    <button id="btn-rejected" onclick="showRejected()" class="btn btn-sm mx-1">Rejected</button>
  </div>

  <div id="jobContainer" class="grid grid-cols-1 gap-4">

  </div>

  <div id="emptyState" class="hidden mt-10 text-center">
    <img src="jobs.png" alt="No jobs" class="w-40 mx-auto mb-4">
    <h3 class="text-xl font-bold">No Jobs Available</h3>
    <p class="text-gray-500">Please change job status to see jobs here.</p>
  </div>

</div>

### 1. What is the difference between getElementById, getElementsByClassName, and querySelector / querySelectorAll?

### 2. How do you create and insert a new element into the DOM?
=A create and insert a new element into the DOM in JavaScript and you use the document.createElement() method and then insert it using methods like appendChild() or append().

### 3. What is Event Bubbling? And how does it work?
= Event Bubbling is a concept in JavaScript where an event starts on the element that was clicked and then moves up to  parent elements.
When you click on something like a button the event first works on that button. After that the same event goes to parent element. Then it continues going up to the next parent and it can keep going up until  reaches the document.

### 4. What is Event Delegation in JavaScript? Why is it useful?
= Event Delegation is a technique in JavaScript where instead of adding event listeners to many child elements you add one event listener to their parent element and handle the events      from   there.
It works because of Event Bubbling. When a child element is clicked, the event moves up to its parent. The parent can then check which child triggered the event and respond accordingly.
Ex:
<ul id="list">
  <li>Item 1</li>
  <li>Item 2</li>
  <li>Item 3</li>
</ul>

### 5. What is the difference between preventDefault() and stopPropagation() methods?
= For example when you click a link, it normally opens a new page. When you submit a form is normally reloads the page. If you use preventDefault() these default actions will not happen.
Ex:

document.querySelector("a").addEventListener("click", function(event) {
  event.preventDefault();
  console.log("Link click stopped");
});

<script src="script.js"></script>

</body>
</html>
